<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% if register %}Register{% else %}Login{% endif %} — AI Student Analytics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link href="{{ url_for('static',filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body class="auth-body">

<!-- Animated background blobs -->
<div class="auth-blobs">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
</div>

<div class="auth-wrapper">
  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon"><i class="bi bi-graph-up-arrow"></i></div>
      <h1 class="auth-brand">StudentAI</h1>
      <p class="auth-tagline">AI-Powered Performance Analytics</p>
    </div>

    <!-- Alerts -->
    {% if error %}
    <div class="alert alert-danger glass-alert py-2 mb-3">{{ error }}</div>
    {% endif %}
    {% for cat, msg in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ cat }} glass-alert py-2 mb-3">{{ msg }}</div>
    {% endfor %}

    <!-- Tabs -->
    <div class="auth-tabs mb-4">
      <a href="{{ url_for('login') }}"    class="auth-tab {% if not register %}active{% endif %}">Login</a>
      <a href="{{ url_for('register') }}" class="auth-tab {% if register %}active{% endif %}">Register</a>
    </div>

    {% if not register %}
    <!-- LOGIN FORM -->
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-floating mb-3">
        <input type="text" class="form-control auth-input" id="username" name="username"
               placeholder="Username" required autofocus/>
        <label for="username"><i class="bi bi-person me-1"></i>Username</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control auth-input" id="password" name="password"
               placeholder="Password" required/>
        <label for="password"><i class="bi bi-lock me-1"></i>Password</label>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember" id="remember"/>
          <label class="form-check-label text-muted" for="remember">Remember me</label>
        </div>
      </div>
      <button type="submit" class="btn-auth w-100">
        <i class="bi bi-lightning-charge-fill me-2"></i>Sign In
      </button>
    </form>
    {% if default_admin_hint %}
    <p class="auth-hint mt-3">{{ default_admin_hint }}</p>
    {% endif %}

    {% else %}
    <!-- REGISTER FORM -->
    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-floating mb-3">
        <input type="text" class="form-control auth-input" id="username" name="username"
               placeholder="Username" required autofocus/>
        <label for="username"><i class="bi bi-person me-1"></i>Username</label>
      </div>
      <div class="form-floating mb-3">
        <input type="email" class="form-control auth-input" id="email" name="email"
               placeholder="Email" required/>
        <label for="email"><i class="bi bi-envelope me-1"></i>Email</label>
      </div>
      <div class="form-floating mb-4">
        <input type="password" class="form-control auth-input" id="password" name="password"
               placeholder="Password" required/>
        <label for="password"><i class="bi bi-lock me-1"></i>Password</label>
      </div>
      <button type="submit" class="btn-auth w-100">
        <i class="bi bi-person-plus-fill me-2"></i>Create Account
      </button>
    </form>
    {% endif %}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
