{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <div class="glass-card">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Create an Account</h2>
        <form method="POST" action="">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Sign Up</button>
        </form>
        <div style="text-align: center; margin-top: 1rem;">
            <small style="color: var(--text-secondary)">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--accent-color);">Log in</a></small>
        </div>
    </div>
</div>
{% endblock %}
